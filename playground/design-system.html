<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dawarich Design System Playground</title>
<style>
/* ---------- Playground Chrome ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --chrome-bg: #111;
  --chrome-surface: #1a1a1a;
  --chrome-border: #2a2a2a;
  --chrome-text: #e0e0e0;
  --chrome-text-dim: #888;
  --chrome-accent: #6366F1;
  --chrome-radius: 6px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  color: var(--chrome-text);
  background: var(--chrome-bg);
  height: 100vh;
  overflow: hidden;
}

/* ---------- Layout ---------- */
.playground {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 48px 1fr 180px;
  height: 100vh;
}

.toolbar {
  grid-column: 1 / -1;
  background: var(--chrome-surface);
  border-bottom: 1px solid var(--chrome-border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
}

.toolbar h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--chrome-text);
  white-space: nowrap;
}

.toolbar .sep { width: 1px; height: 24px; background: var(--chrome-border); }

.preset-bar {
  display: flex;
  gap: 6px;
}

.preset-btn {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--chrome-border);
  border-radius: 99px;
  background: transparent;
  color: var(--chrome-text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--chrome-accent); color: var(--chrome-text); }
.preset-btn.active { background: var(--chrome-accent); border-color: var(--chrome-accent); color: #fff; }

.controls {
  background: var(--chrome-surface);
  border-right: 1px solid var(--chrome-border);
  overflow-y: auto;
  padding: 12px;
}

.preview-area {
  overflow: auto;
  position: relative;
}

.prompt-area {
  grid-column: 1 / -1;
  background: var(--chrome-surface);
  border-top: 1px solid var(--chrome-border);
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
}

.prompt-area .label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.prompt-area label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--chrome-text-dim); }

.copy-btn {
  padding: 4px 14px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--chrome-border);
  border-radius: 4px;
  background: transparent;
  color: var(--chrome-text);
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { border-color: var(--chrome-accent); }
.copy-btn.copied { background: #059669; border-color: #059669; color: #fff; }

#prompt-output {
  flex: 1;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--chrome-text);
  background: var(--chrome-bg);
  border: 1px solid var(--chrome-border);
  border-radius: 4px;
  padding: 10px 14px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

/* ---------- Control Groups ---------- */
.control-group {
  margin-bottom: 16px;
}

.control-group summary {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--chrome-text-dim);
  cursor: pointer;
  padding: 6px 0;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
}

.control-group summary::before {
  content: '\25B6';
  font-size: 8px;
  transition: transform 0.15s;
}

.control-group[open] summary::before { transform: rotate(90deg); }

.control-group .fields { padding: 8px 0 4px 0; }

.field {
  margin-bottom: 10px;
}

.field label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--chrome-text);
  margin-bottom: 4px;
}

.field label .val {
  font-family: monospace;
  font-size: 11px;
  color: var(--chrome-accent);
}

.field input[type="range"] {
  width: 100%;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--chrome-border);
  border-radius: 2px;
  outline: none;
}

.field input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--chrome-accent);
  cursor: pointer;
}

.field input[type="color"] {
  width: 36px;
  height: 24px;
  border: 1px solid var(--chrome-border);
  border-radius: 4px;
  padding: 0;
  cursor: pointer;
  background: none;
}

.field select {
  width: 100%;
  padding: 5px 8px;
  font-size: 12px;
  background: var(--chrome-bg);
  color: var(--chrome-text);
  border: 1px solid var(--chrome-border);
  border-radius: 4px;
  outline: none;
}

.color-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.color-row input[type="color"] { flex-shrink: 0; }
.color-row code { font-size: 11px; color: var(--chrome-text-dim); }

/* Preview page selector */
.page-tabs {
  display: flex;
  gap: 2px;
  background: var(--chrome-bg);
  padding: 4px;
  border-radius: 6px;
  margin-bottom: 12px;
}

.page-tab {
  flex: 1;
  padding: 5px 4px;
  font-size: 10px;
  font-weight: 500;
  text-align: center;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--chrome-text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.page-tab:hover { color: var(--chrome-text); }
.page-tab.active { background: var(--chrome-accent); color: #fff; }

/* ---------- Preview Rendering ---------- */
#preview-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<div class="playground">
  <!-- Toolbar -->
  <div class="toolbar">
    <h1>Dawarich Design System</h1>
    <div class="sep"></div>
    <div class="preset-bar">
      <button class="preset-btn active" onclick="applyPreset('minimal')">Minimal</button>
      <button class="preset-btn" onclick="applyPreset('journal')">Journal</button>
      <button class="preset-btn" onclick="applyPreset('editorial')">Editorial</button>
      <button class="preset-btn" onclick="applyPreset('fieldwork')">Fieldwork</button>
      <button class="preset-btn" onclick="applyPreset('nightowl')">Night Owl</button>
      <button class="preset-btn" onclick="applyPreset('notebook')">Notebook</button>
    </div>
    <div style="flex:1"></div>
    <label style="font-size:11px;display:flex;align-items:center;gap:6px;color:var(--chrome-text-dim)">
      <input type="checkbox" id="darkToggle" onchange="state.darkMode=this.checked; updateAll()"> Dark Mode
    </label>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Page selector -->
    <div class="page-tabs">
      <button class="page-tab active" data-page="components" onclick="switchPage(this)">Components</button>
      <button class="page-tab" data-page="map" onclick="switchPage(this)">Map</button>
      <button class="page-tab" data-page="stats" onclick="switchPage(this)">Stats</button>
      <button class="page-tab" data-page="trips" onclick="switchPage(this)">Trips</button>
      <button class="page-tab" data-page="imports" onclick="switchPage(this)">Imports</button>
      <button class="page-tab" data-page="insights" onclick="switchPage(this)">Insights</button>
    </div>

    <!-- Background -->
    <details class="control-group" open>
      <summary>Background</summary>
      <div class="fields">
        <div class="field">
          <label>Warmth</label>
          <select id="s-warmth" onchange="state.warmth=this.value; updateAll()">
            <option value="cream">Warm Cream</option>
            <option value="rose">Rose Sand</option>
            <option value="sage">Sage Neutral</option>
            <option value="golden">Golden Lamp</option>
          </select>
        </div>
        <div class="field">
          <label>Texture</label>
          <select id="s-bg-texture" onchange="state.bgTexture=this.value; updateAll()">
            <option value="none">None (flat)</option>
            <option value="grain">Grain (paper-like)</option>
            <option value="dots">Dot Grid (technical)</option>
            <option value="gradient">Soft Gradient (ambient)</option>
            <option value="topo">Topo Lines (map-inspired)</option>
          </select>
        </div>
      </div>
    </details>

    <!-- Colors -->
    <details class="control-group" open>
      <summary>Colors</summary>
      <div class="fields">
        <div class="field">
          <label>Primary <span class="val" id="v-primary">#4F46E5</span></label>
          <div class="color-row">
            <input type="color" id="c-primary" value="#4F46E5" oninput="state.primary=this.value; document.getElementById('v-primary').textContent=this.value; updateAll()">
            <code>--color-primary</code>
          </div>
        </div>
        <div class="field">
          <label>Accent <span class="val" id="v-accent">#0D9488</span></label>
          <div class="color-row">
            <input type="color" id="c-accent" value="#0D9488" oninput="state.accent=this.value; document.getElementById('v-accent').textContent=this.value; updateAll()">
            <code>--color-accent</code>
          </div>
        </div>
        <div class="field">
          <label>Warning <span class="val" id="v-warning">#F59E0B</span></label>
          <div class="color-row">
            <input type="color" id="c-warning" value="#F59E0B" oninput="state.warning=this.value; document.getElementById('v-warning').textContent=this.value; updateAll()">
            <code>--color-warning</code>
          </div>
        </div>
        <div class="field">
          <label>Danger <span class="val" id="v-danger">#EF4444</span></label>
          <div class="color-row">
            <input type="color" id="c-danger" value="#EF4444" oninput="state.danger=this.value; document.getElementById('v-danger').textContent=this.value; updateAll()">
            <code>--color-danger</code>
          </div>
        </div>
        <div class="field">
          <label>Info <span class="val" id="v-info">#0EA5E9</span></label>
          <div class="color-row">
            <input type="color" id="c-info" value="#0EA5E9" oninput="state.info=this.value; document.getElementById('v-info').textContent=this.value; updateAll()">
            <code>--color-info</code>
          </div>
        </div>
      </div>
    </details>

    <!-- Typography -->
    <details class="control-group" open>
      <summary>Typography</summary>
      <div class="fields">
        <div class="field">
          <label>Heading Font</label>
          <select id="s-heading" onchange="state.headingFont=this.value; updateAll()">
            <optgroup label="Sans Serif">
              <option value="Poppins" selected>Poppins</option>
              <option value="Outfit">Outfit</option>
              <option value="Space Grotesk">Space Grotesk</option>
              <option value="DM Sans">DM Sans</option>
              <option value="Inter">Inter</option>
              <option value="Fira Code">Fira Code (mono)</option>
              <option value="system-ui">System UI</option>
            </optgroup>
            <optgroup label="Serif">
              <option value="Playfair Display">Playfair Display</option>
              <option value="Lora">Lora</option>
              <option value="Source Serif 4">Source Serif 4</option>
              <option value="Merriweather">Merriweather</option>
              <option value="Libre Baskerville">Libre Baskerville</option>
              <option value="DM Serif Display">DM Serif Display</option>
              <option value="Fraunces">Fraunces</option>
              <option value="Instrument Serif">Instrument Serif</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>Body Font</label>
          <select id="s-body" onchange="state.bodyFont=this.value; updateAll()">
            <option value="Inter" selected>Inter</option>
            <option value="Work Sans">Work Sans</option>
            <option value="Fira Sans">Fira Sans</option>
            <option value="Open Sans">Open Sans</option>
            <option value="DM Sans">DM Sans</option>
            <option value="system-ui">System UI</option>
          </select>
        </div>
        <div class="field">
          <label>Base Size <span class="val" id="v-base-size">16px</span></label>
          <input type="range" min="13" max="20" value="16" oninput="state.baseSize=+this.value; document.getElementById('v-base-size').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Heading Weight <span class="val" id="v-heading-wt">600</span></label>
          <input type="range" min="400" max="800" step="100" value="600" oninput="state.headingWeight=+this.value; document.getElementById('v-heading-wt').textContent=this.value; updateAll()">
        </div>
      </div>
    </details>

    <!-- Spacing & Shape -->
    <details class="control-group" open>
      <summary>Spacing &amp; Shape</summary>
      <div class="fields">
        <div class="field">
          <label>Border Radius <span class="val" id="v-radius">6px</span></label>
          <input type="range" min="0" max="24" value="6" oninput="state.radius=+this.value; document.getElementById('v-radius').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Card Padding <span class="val" id="v-padding">20px</span></label>
          <input type="range" min="12" max="40" step="4" value="20" oninput="state.cardPadding=+this.value; document.getElementById('v-padding').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Grid Gap <span class="val" id="v-gap">18px</span></label>
          <input type="range" min="8" max="32" step="2" value="18" oninput="state.gap=+this.value; document.getElementById('v-gap').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Shadow Intensity <span class="val" id="v-shadow">0.04</span></label>
          <input type="range" min="0" max="25" value="4" oninput="state.shadowOpacity=this.value/100; document.getElementById('v-shadow').textContent=(this.value/100).toFixed(2); updateAll()">
        </div>
      </div>
    </details>

    <!-- Density -->
    <details class="control-group">
      <summary>Density</summary>
      <div class="fields">
        <div class="field">
          <label>Navbar Height <span class="val" id="v-nav-h">64px</span></label>
          <input type="range" min="48" max="80" step="4" value="64" oninput="state.navHeight=+this.value; document.getElementById('v-nav-h').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Sidebar Width <span class="val" id="v-sidebar-w">400px</span></label>
          <input type="range" min="280" max="520" step="20" value="400" oninput="state.sidebarWidth=+this.value; document.getElementById('v-sidebar-w').textContent=this.value+'px'; updateAll()">
        </div>
        <div class="field">
          <label>Stat Columns <span class="val" id="v-stat-cols">4</span></label>
          <input type="range" min="2" max="6" value="4" oninput="state.statCols=+this.value; document.getElementById('v-stat-cols').textContent=this.value; updateAll()">
        </div>
      </div>
    </details>

    <!-- Component Variants -->
    <details class="control-group" open>
      <summary>Component Variants</summary>
      <div class="fields">
        <div class="field">
          <label>Stat Cards</label>
          <select id="s-stat-style" onchange="state.statStyle=this.value; updateAll()">
            <option value="minimal">Minimal (number + label)</option>
            <option value="accented">Accented (color bar left)</option>
            <option value="tinted">Tinted (background tint)</option>
          </select>
        </div>
        <div class="field">
          <label>Navbar</label>
          <select id="s-nav-style" onchange="state.navStyle=this.value; updateAll()">
            <option value="solid">Solid</option>
            <option value="glass">Glass (blur)</option>
            <option value="transparent">Transparent</option>
          </select>
        </div>
        <div class="field">
          <label>Tabs</label>
          <select id="s-tab-style" onchange="state.tabStyle=this.value; updateAll()">
            <option value="underline">Underline</option>
            <option value="pill">Pill</option>
            <option value="boxed">Boxed</option>
          </select>
        </div>
        <div class="field">
          <label>Card Hover</label>
          <select id="s-card-hover" onchange="state.cardHover=this.value; updateAll()">
            <option value="shadow">Shadow</option>
            <option value="lift">Lift (translateY)</option>
            <option value="border">Border color</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="field">
          <label>Timeline</label>
          <select id="s-timeline" onchange="state.timelineStyle=this.value; updateAll()">
            <option value="dots">Dots</option>
            <option value="icons">Mode Icons</option>
            <option value="timestamps">Timestamps Left</option>
          </select>
        </div>
        <div class="field">
          <label>Badges</label>
          <select id="s-badge" onchange="state.badgeStyle=this.value; updateAll()">
            <option value="filled">Filled (tinted bg)</option>
            <option value="outline">Outline (border only)</option>
            <option value="subtle">Subtle (lighter tint)</option>
          </select>
        </div>
        <div class="field">
          <label>Button Hover</label>
          <select id="s-btn-hover" onchange="state.btnHover=this.value; updateAll()">
            <option value="darken">Darken</option>
            <option value="lift">Lift</option>
            <option value="glow">Glow</option>
          </select>
        </div>
      </div>
    </details>
  </div>

  <!-- Preview -->
  <div class="preview-area">
    <div id="preview" style="width:100%;height:100%;overflow:auto;"></div>
  </div>

  <!-- Prompt Output -->
  <div class="prompt-area">
    <div class="label-row">
      <label>Generated Prompt</label>
      <button class="copy-btn" onclick="copyPrompt(this)">Copy Prompt</button>
    </div>
    <div id="prompt-output"></div>
  </div>
</div>

<script>
// ---------- State ----------
const DEFAULTS = {
  primary: '#4F46E5', accent: '#0D9488', warning: '#F59E0B', danger: '#EF4444', info: '#0EA5E9',
  headingFont: 'Inter', bodyFont: 'Inter', baseSize: 16, headingWeight: 500,
  radius: 6, cardPadding: 20, gap: 18, shadowOpacity: 0.04,
  navHeight: 64, sidebarWidth: 400, statCols: 4,
  // Warmth & Background
  warmth: 'cream',            // cream | rose | sage | golden
  bgTexture: 'none',          // none | grain | dots | gradient | topo
  // Tier 2 variants
  statStyle: 'minimal',       // minimal | accented | tinted
  navStyle: 'solid',          // solid | glass | transparent
  tabStyle: 'underline',      // underline | pill | boxed
  cardHover: 'border',        // shadow | lift | border | none
  timelineStyle: 'dots',      // dots | icons | timestamps
  badgeStyle: 'outline',      // filled | outline | subtle
  btnHover: 'darken',         // darken | lift | glow
  darkMode: false, page: 'components'
};

const state = { ...DEFAULTS };

// ---------- Presets ----------
const PRESETS = {
  // Base — clean, distinct web product, no platform cues
  minimal: { primary:'#4F46E5', accent:'#0D9488', warning:'#F59E0B', danger:'#EF4444', info:'#0EA5E9', headingFont:'Inter', bodyFont:'Inter', baseSize:16, headingWeight:500, radius:6, cardPadding:20, gap:18, shadowOpacity:0.04, warmth:'cream', bgTexture:'none', statStyle:'minimal', navStyle:'solid', tabStyle:'underline', cardHover:'border', timelineStyle:'dots', badgeStyle:'outline', btnHover:'darken' },
  // Journal — serif headings, golden warmth, subtle grain like old paper
  journal: { primary:'#4F46E5', accent:'#0D9488', warning:'#D97706', danger:'#DC2626', info:'#0EA5E9', headingFont:'Lora', bodyFont:'Inter', baseSize:16, headingWeight:600, radius:6, cardPadding:20, gap:18, shadowOpacity:0.05, warmth:'golden', bgTexture:'grain', statStyle:'minimal', navStyle:'solid', tabStyle:'underline', cardHover:'border', timelineStyle:'timestamps', badgeStyle:'outline', btnHover:'darken' },
  // Editorial — sharp serif, rose tones, soft gradient
  editorial: { primary:'#6D28D9', accent:'#BE185D', warning:'#F59E0B', danger:'#DC2626', info:'#0EA5E9', headingFont:'Playfair Display', bodyFont:'Inter', baseSize:16, headingWeight:700, radius:4, cardPadding:22, gap:18, shadowOpacity:0.03, warmth:'rose', bgTexture:'gradient', statStyle:'accented', navStyle:'solid', tabStyle:'underline', cardHover:'border', timelineStyle:'timestamps', badgeStyle:'outline', btnHover:'darken' },
  // Fieldwork — earthy, practical, topo lines like a trail map
  fieldwork: { primary:'#166534', accent:'#B45309', warning:'#F59E0B', danger:'#DC2626', info:'#0D9488', headingFont:'DM Sans', bodyFont:'DM Sans', baseSize:15, headingWeight:600, radius:6, cardPadding:18, gap:14, shadowOpacity:0.05, warmth:'sage', bgTexture:'topo', statStyle:'accented', navStyle:'solid', tabStyle:'underline', cardHover:'shadow', timelineStyle:'icons', badgeStyle:'outline', btnHover:'darken' },
  // Night Owl — dark mode, subtle dot grid
  nightowl: { primary:'#818CF8', accent:'#34D399', warning:'#FBBF24', danger:'#F87171', info:'#38BDF8', headingFont:'Outfit', bodyFont:'Inter', baseSize:16, headingWeight:500, radius:6, cardPadding:20, gap:18, shadowOpacity:0.0, warmth:'golden', bgTexture:'dots', statStyle:'minimal', navStyle:'solid', tabStyle:'underline', cardHover:'border', timelineStyle:'dots', badgeStyle:'outline', btnHover:'darken' },
  // Notebook — Fraunces serif, cream, soft grain
  notebook: { primary:'#7C3AED', accent:'#059669', warning:'#F59E0B', danger:'#EF4444', info:'#0EA5E9', headingFont:'Fraunces', bodyFont:'Inter', baseSize:16, headingWeight:600, radius:8, cardPadding:22, gap:20, shadowOpacity:0.04, warmth:'cream', bgTexture:'grain', statStyle:'minimal', navStyle:'solid', tabStyle:'underline', cardHover:'border', timelineStyle:'dots', badgeStyle:'outline', btnHover:'darken' }
};

function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  Object.assign(state, p);
  if (name === 'nightowl') { state.darkMode = true; } else { state.darkMode = false; }
  document.getElementById('darkToggle').checked = state.darkMode;
  syncControls();
  updateAll();
  document.querySelectorAll('.preset-btn').forEach(b => {
    const btnName = b.textContent.toLowerCase().replace(/\s/g,'');
    b.classList.toggle('active', btnName === name || btnName === name.replace(/\s/g,''));
  });
}

function syncControls() {
  document.getElementById('c-primary').value = state.primary;
  document.getElementById('v-primary').textContent = state.primary;
  document.getElementById('c-accent').value = state.accent;
  document.getElementById('v-accent').textContent = state.accent;
  document.getElementById('c-warning').value = state.warning;
  document.getElementById('v-warning').textContent = state.warning;
  document.getElementById('c-danger').value = state.danger;
  document.getElementById('v-danger').textContent = state.danger;
  document.getElementById('c-info').value = state.info;
  document.getElementById('v-info').textContent = state.info;
  document.getElementById('s-heading').value = state.headingFont;
  document.getElementById('s-body').value = state.bodyFont;

// ---------- Color Helpers ----------
function hexToRgb(h) { const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16); return {r,g,b}; }
function lighten(hex, amt) { const {r,g,b} = hexToRgb(hex); return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`; }
function alpha(hex, a) { const {r,g,b} = hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }

const PALETTES = {

function getTheme() {
  const p = PALETTES[state.warmth] || PALETTES.cream;
  return state.darkMode ? p.dark : p.light;
}

function statItem(s, color, value, label) {
  let style = '';
  if (s.statStyle === 'accented') style = `border-left:3px solid ${color};`;

  return `<div class="stat-item" style="${style}"><div class="stat-value" style="color:${color}">${value}</div><div class="stat-label">${label}</div></div>`;
}

function renderTimeline(s) {
  const dk = s.darkMode;
  const txt3 = dk ? '#64748B' : '#94A3B8';
  const entries = [
    {time:'09:15',mode:'walking',icon:'\u{1F6B6}',text:'Walking',dist:'1.2 km',dur:'25 min'},
    {time:'09:40',visit:true,text:'Home Office',dur:'30 min'},
    {time:'10:10',mode:'driving',icon:'\u{1F697}',text:'Driving',dist:'8.5 km',dur:'15 min',expanded:true},
    {time:'10:25',visit:true,text:'Coffee House',dur:'45 min'},
    {time:'11:10',mode:'cycling',icon:'\u{1F6B4}',text:'Cycling',dist:'3.2 km',dur:'12 min'},
    {time:'11:22',visit:true,text:'Office',dur:'4 hr'},
    {time:'15:30',mode:'walking',icon:'\u{1F6B6}',text:'Walking',dist:'0.8 km',dur:'10 min'},
  ];
  if (s.timelineStyle === 'timestamps') {
    return entries.map(e => {
      const cls = e.visit ? 'visit' : '';
      const content = e.visit
        ? `<span style="font-weight:500">${e.text}</span> <span class="badge badge-accent">${e.dur}</span>`
        : `${e.text} &middot; ${e.dist} &middot; ${e.dur}`;
      const info = e.expanded ? renderTrackInfo(s) : '';
      return `<div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid ${getTheme().bgSunk}">
        <div style="min-width:48px;font-size:0.72rem;color:${txt3};font-variant-numeric:tabular-nums;padding-top:2px">${e.time}</div>
        <div style="flex:1;font-size:0.85rem">${content}${info}</div>
      </div>`;
    }).join('');
  }
  return `<div class="timeline">${entries.map(e => {
    const cls = e.visit ? ' visit' : '';
    const nodeStyle = s.timelineStyle === 'icons' && !e.visit
      ? `style="font-size:14px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;position:absolute;left:-26px;top:2px;background:none;border:none"` : '';
    const content = e.visit
      ? `<div class="tl-content" style="font-weight:500">${e.text} <span class="badge badge-accent" style="margin-left:4px">${e.dur}</span></div>`
      : `<div class="tl-content">${e.text} &middot; ${e.dist} &middot; ${e.dur}</div>`;
    const info = e.expanded ? renderTrackInfo(s) : '';
    let iconOverride = '';
    if (s.timelineStyle === 'icons' && !e.visit) {
      iconOverride = `<span style="position:absolute;left:-26px;top:1px;font-size:13px;line-height:1">${e.icon}</span>`;
    }
    return `<div class="tl-item${cls}">
      ${iconOverride}
      <div class="tl-time">${e.time}</div>
      ${content}${info}
    </div>`;
  }).join('')}</div>`;
}

// ---------- Render ----------

function renderPreview() {
  const css = genCSS();

function updatePrompt() {
  const s = state;
  const d = DEFAULTS;
  const parts = [];

  parts.push(`Update the Dawarich design system with these tokens:`);

  if (s.warmth !== d.warmth || s.bgTexture !== d.bgTexture) {
    const warmthDesc = {cream:'warm cream (ivory, nearly neutral)',rose:'rose sand (pinkish warmth, personal)',sage:'sage neutral (green-gray, earthy, calm)',golden:'golden neutral (hint of gold, lamplight cozy)'};
    const texDesc = {none:'flat',grain:'subtle paper grain overlay (SVG noise filter, ~3% opacity)',dots:'dot grid pattern (20px spacing, ~6% opacity)',gradient:'soft ambient gradient (primary + accent radial blurs)',topo:'topographic contour lines (map-inspired, ~3.5% opacity)'};
    let bgParts = [];
    if (s.warmth !== d.warmth) bgParts.push(`warmth: ${warmthDesc[s.warmth]}`);
    if (s.bgTexture !== d.bgTexture) bgParts.push(`texture: ${texDesc[s.bgTexture]}`);
    parts.push(`\nBackground: ${bgParts.join(', ')}.`);
  }

  if (s.primary !== d.primary || s.accent !== d.accent) {
    parts.push(`\nColors: primary ${s.primary}${s.accent !== d.accent ? `, accent ${s.accent}` : ''}${s.warning !== d.warning ? `, warning ${s.warning}` : ''}${s.danger !== d.danger ? `, danger ${s.danger}` : ''}${s.info !== d.info ? `, info ${s.info}` : ''}.`);
  }

  if (s.headingFont !== d.headingFont || s.bodyFont !== d.bodyFont) {
    parts.push(`\nTypography: ${s.headingFont} for headings (weight ${s.headingWeight}), ${s.bodyFont} for body text at ${s.baseSize}px base.`);
  } else if (s.baseSize !== d.baseSize || s.headingWeight !== d.headingWeight) {
    parts.push(`\nTypography: base size ${s.baseSize}px, heading weight ${s.headingWeight}.`);
  }

  const shapeParts = [];
  if (s.radius !== d.radius) shapeParts.push(`border-radius ${s.radius}px`);
  if (s.cardPadding !== d.cardPadding) shapeParts.push(`card padding ${s.cardPadding}px`);
  if (s.gap !== d.gap) shapeParts.push(`grid gap ${s.gap}px`);
  if (s.shadowOpacity !== d.shadowOpacity) {
    const desc = s.shadowOpacity > 0.15 ? 'pronounced' : s.shadowOpacity > 0.05 ? 'subtle' : s.shadowOpacity === 0 ? 'no' : 'very subtle';
    shapeParts.push(`${desc} shadows (opacity ${s.shadowOpacity.toFixed(2)})`);
  }
  if (shapeParts.length) parts.push(`\nShape: ${shapeParts.join(', ')}.`);

  const layoutParts = [];
  if (s.navHeight !== d.navHeight) layoutParts.push(`navbar height ${s.navHeight}px`);
  if (s.sidebarWidth !== d.sidebarWidth) layoutParts.push(`map sidebar width ${s.sidebarWidth}px`);
  if (s.statCols !== d.statCols) layoutParts.push(`${s.statCols} stat columns`);
  if (layoutParts.length) parts.push(`\nLayout: ${layoutParts.join(', ')}.`);

  // Component variants
  const variantParts = [];
  if (s.statStyle !== d.statStyle) variantParts.push(`stat cards: ${s.statStyle} style${s.statStyle==='accented'?' (color bar on left)':s.statStyle==='tinted'?' (colored background tint)':''}`);
  if (s.navStyle !== d.navStyle) variantParts.push(`navbar: ${s.navStyle}${s.navStyle==='glass'?' (backdrop-blur, semi-transparent)':s.navStyle==='transparent'?' (no background or border)':''}`);
  if (s.tabStyle !== d.tabStyle) variantParts.push(`tabs: ${s.tabStyle} style`);
  if (s.cardHover !== d.cardHover) variantParts.push(`card hover: ${s.cardHover}${s.cardHover==='lift'?' (translateY -3px with shadow)':s.cardHover==='border'?' (primary border color)':''}`);
  if (s.timelineStyle !== d.timelineStyle) variantParts.push(`timeline: ${s.timelineStyle}${s.timelineStyle==='icons'?' (mode emoji icons instead of dots)':s.timelineStyle==='timestamps'?' (time column on left, no vertical line)':''}`);
  if (s.badgeStyle !== d.badgeStyle) variantParts.push(`badges: ${s.badgeStyle}${s.badgeStyle==='outline'?' (border only, no fill)':s.badgeStyle==='subtle'?' (lighter tint)':''}`);
  if (s.btnHover !== d.btnHover) variantParts.push(`button hover: ${s.btnHover}${s.btnHover==='lift'?' (translateY -1px with shadow)':s.btnHover==='glow'?' (box-shadow ring)':''}`);
  if (variantParts.length) parts.push(`\nComponent variants:\n- ${variantParts.join('\n- ')}`);

  if (s.darkMode) parts.push(`\nTheme: dark mode enabled. Use desaturated, lighter tonal variants.`);

  if (parts.length <= 1) parts.push(`\n(Default Travel Explorer preset - no changes from baseline.)`);

  parts.push(`\n\nApply these to the DaisyUI theme configuration and Tailwind config. Update CSS custom properties in the design system stylesheet.`);

  document.getElementById('prompt-output').textContent = parts.join('');
}

function updateAll() {
  renderPreview();
  updatePrompt();
}

function copyPrompt(btn) {
  navigator.clipboard.writeText(document.getElementById('prompt-output').textContent);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1500);
}

// ---------- Init ----------
// Delegate clicks on preview navbar links to switch pages
document.getElementById('preview').addEventListener('click', function(e) {
  const navLink = e.target.closest('[data-nav-page]');
  if (navLink) {
    e.preventDefault();
    const page = navLink.dataset.navPage;
    state.page = page;
    // Sync the control panel tabs
    document.querySelectorAll('.page-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
    updateAll();
  }
});

updateAll();
</script>
