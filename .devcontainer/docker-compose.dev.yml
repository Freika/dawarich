services:
  dawarich_app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    entrypoint: [] # This clears the production entrypoint script
    command: sleep infinity 
    healthcheck:
      test: ["CMD", "true"]
    volumes:
      - ..:/var/app:cached
      - dawarich_node_modules:/var/app/node_modules # Fast JS dependencies
      - dawarich_bundle:/usr/local/bundle          # Fast Ruby gems
    environment:
      RAILS_ENV: development

  dawarich_sidekiq:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    entrypoint: [] # This clears 'sidekiq-entrypoint.sh' which was failing
    command: bundle exec sidekiq
    depends_on:
      dawarich_db:
        condition: service_started
      dawarich_app:
        condition: service_started
    volumes:
      - ..:/var/app:cached
      - dawarich_node_modules:/var/app/node_modules
      - dawarich_bundle:/usr/local/bundle
    environment:
      RAILS_ENV: development

volumes:
  dawarich_node_modules:
  dawarich_bundle: